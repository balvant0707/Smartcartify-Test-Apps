[mcp_servers.shopify-dev-mcp]
command = "npx"
args = [
    "-y",
    "@shopify/dev-mcp@latest",
]

[mcp_servers.shopify-dev-mcp.env]
POLARIS_UNIFIED = "true"
LIQUID = "true"

[mcp_servers.shopify-dev-mcp.tools.validate_component_codeblocks]
approval_mode = "approve"

[mcp_servers.shopify-dev-mcp.tools.learn_shopify_api]
approval_mode = "approve"

[mcp_servers.shopify-dev-mcp.tools.search_docs_chunks]
approval_mode = "approve"

[mcp_servers.shopify-dev-mcp.tools.validate_graphql_codeblocks]
approval_mode = "approve"

[mcp_servers.shopify-dev-mcp.tools.validate_theme]
approval_mode = "approve"
